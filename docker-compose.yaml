version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: keycloak-postgres

    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak

    volumes:
      #- postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak

    command: start-dev

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 20

    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_HOSTNAME_STRICT: "false"

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

    ports:
      - "8081:8080"


  redis:
    image: redis:7-alpine # Use the official Redis image
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379" # Map port 6379 on the host to 6379 in the container

  backend:
    build:
      context: ./backend
      args:
        VERSION: v0.1.3
    container_name: mine-backend
    ports:
      - "8000:8000"
    environment:

      MINIO_MC_ALIAS: minio
      S3_REGION: us-east-1
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: senha_forte
      S3_SECURE: false

      ADMIN_PATH :  'mine_adapter_minio.factory'
      S3_CLIENT_PATH :  'mine_adapter_minio.factory'

      KEYCLOAK_URL: http://keycloak:8080/
      KEYCLOAK_REALM: infra
      KEYCLOAK_CLIENT_ID: minio
      KEYCLOAK_CLIENT_SECRET: OlXJhYsCS9RbnxdKQW62NWBvV6L71kcZ

      OPENID_ROLE_CLAIM: policy
      ADMIN_ROLE: consoleAdmin

      INTERNAL_TOKEN_SECRET: super-secret-change-this
      INTERNAL_TOKEN_EXP_MINUTES: 30

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      CORS_ALLOWED_ORIGINS: '["http://localhost:4200", "http://localhost:8080"]'
      MCP_ALLOWED_HOSTS: '["backend:*"]'
      MCP_ALLOWED_ORIGINS: '["http://backend:*"]'

    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started


    restart: unless-stopped


  agent:
    profiles:
      - agent
    build:
      context: ./ai-backend
      args:
        VERSION: v0.1.0
    container_name: mine-ai-backend
    ports:
      - "8001:8000"
    environment:

      MODEL_PROVIDER: 'lmstudio'
      EMBEDDING_PROVIDER: 'lmstudio'
      LMSTUDIO_URL: 'http://192.168.15.17:1234/v1'
      LMSTUDIO_MODEL: 'google/gemma-3n-e4b'
      LMSTUDIO_EMBEDDING_MODEL: 'text-embedding-nomic-embed-text-v1.5'
      FASTEMBED_EMBEDDING_MODEL: 'BAAI/bge-small-en-v1.5'
      MCP_URLS: '["http://backend:8000/mcp"]'
      DATA_DIR: 'data'
      INTERNAL_TOKEN_SECRET: 'super-secret-change-this'
    volumes:
      - ./mine-ia-data:/app/data
    depends_on:
      - backend

    restart: unless-stopped

  ui:
    build:
      context: ./ui
      args:
        VERSION: v0.1.4
    container_name: mine-ui
    ports:
      - "8080:80"
    environment:
      API_BASE_URL: /api
      # API_AGENT_BASE_URL: /agent
      KEYCLOAK_URL: http://localhost:8081
      KEYCLOAK_REALM: infra
      KEYCLOAK_CLIENT_ID: minio
    depends_on:
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: senha_forte
      MINIO_IDENTITY_OPENID_CONFIG_URL: "http://keycloak:8080/realms/infra/.well-known/openid-configuration"
      MINIO_IDENTITY_OPENID_CLIENT_ID: "minio"
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: "OlXJhYsCS9RbnxdKQW62NWBvV6L71kcZ"
      MINIO_IDENTITY_OPENID_SCOPES: "profile,email"
      MINIO_IDENTITY_OPENID_REDIRECT_URI: "http://localhost:9011/oauth_callback"
      MINIO_IDENTITY_OPENID_CLAIM_NAME: "policy"
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9011"
    volumes:
      - ./minio:/data
    ports:
      - "9010:9000"   # S3 API
      - "9011:9001"   # Admin UI
    command: server /data --console-address ":9001"
    depends_on:
      keycloak:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

